<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nova guia</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!-- fundo -->
  <div class="bg-glow"></div>
  <div class="stars" id="stars"></div>

  <!-- circuitos discretos nas bordas -->
  <svg class="circuit tl" viewBox="0 0 300 220" aria-hidden="true">
    <path d="M0 30 H80 V90 H150" /><path d="M0 80 H40 V150" />
    <circle cx="80" cy="90" r="3" /><circle cx="40" cy="150" r="3" /><circle cx="150" cy="90" r="3" />
  </svg>
  <svg class="circuit br" viewBox="0 0 300 220" aria-hidden="true">
    <path d="M300 190 H220 V130 H150" /><path d="M300 140 H260 V70" />
    <circle cx="220" cy="130" r="3" /><circle cx="260" cy="70" r="3" /><circle cx="150" cy="130" r="3" />
  </svg>

  <!-- barra superior direita -->
  <header class="topbar">
    <a href="https://mail.google.com" class="top-link">Gmail</a>
    <a href="https://www.google.com/imghp" class="top-link">Imagens</a>
    <button class="apps-btn" id="appsBtn" title="Apps do Google">
      <svg viewBox="0 0 24 24"><g fill="currentColor">
        <circle cx="5" cy="5" r="1.6"/><circle cx="12" cy="5" r="1.6"/><circle cx="19" cy="5" r="1.6"/>
        <circle cx="5" cy="12" r="1.6"/><circle cx="12" cy="12" r="1.6"/><circle cx="19" cy="12" r="1.6"/>
        <circle cx="5" cy="19" r="1.6"/><circle cx="12" cy="19" r="1.6"/><circle cx="19" cy="19" r="1.6"/>
      </g></svg>
    </button>
    <div class="avatar" title="Perfil">G</div>
  </header>

  <!-- conteúdo central -->
  <main class="center">
    <h1 class="logo">Google</h1>

    <div class="search-wrap">
      <!-- cena do robô (corre sobre a plataforma) -->
      <canvas id="scene" aria-hidden="true"></canvas>

      <form class="search platform" id="searchForm" autocomplete="off">
        <svg class="ico-search" viewBox="0 0 24 24"><path fill="currentColor" d="M15.5 14h-.79l-.28-.27a6.5 6.5 0 1 0-.7.7l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0A4.5 4.5 0 1 1 14 9.5 4.5 4.5 0 0 1 9.5 14z"/></svg>
        <input type="text" id="searchInput" placeholder="Pesquise no Google ou digite um URL" spellcheck="false" />
        <button type="button" class="ico-mic" title="Pesquisa por voz">
          <svg viewBox="0 0 24 24"><path fill="#66e6ff" d="M12 14a3 3 0 0 0 3-3V5a3 3 0 0 0-6 0v6a3 3 0 0 0 3 3zm5-3a5 5 0 0 1-10 0H5a7 7 0 0 0 6 6.92V21h2v-3.08A7 7 0 0 0 19 11z"/></svg>
        </button>
      </form>
    </div>

    <section class="shortcuts" id="shortcuts"></section>
  </main>

  <script src="newtab.js"></script>
</body>
</html>
